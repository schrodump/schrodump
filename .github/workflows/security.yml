# WHY THIS WORKFLOW EXISTS
#
# A backup tool is a high-value supply chain target: it holds credentials for every database its
# operator runs, and it is trusted to reach all of them. A compromised Schrodump image is not one
# compromised service — it is the customer's entire database estate, plus the backups that would
# have been the way back. That asymmetry is why dependency advisories, image contents, published
# secrets and provenance headers are all checked here, on every change, rather than at release
# time when the pressure to ship makes the answer predictable.

name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Advisories land against code that has not changed, so time alone must trigger this.
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependencies:
    name: dependency advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Two steps on purpose. The gate is set at critical so the workflow stays honest — a gate
      # that is permanently red because an upstream framework has not shipped a patch teaches
      # people to ignore it. Everything at high and below is printed in full and is expected to be
      # read, not skipped.
      - name: Report every advisory
        continue-on-error: true
        run: pnpm audit

      - name: Fail on critical advisories
        run: pnpm audit --audit-level critical

  image:
    name: image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build the production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: schrodump/schrodump:scan
          cache-from: type=gha

      # Scans what actually ships, not what the manifest claims: the runtime tree is pruned after
      # install, so the lockfile and the image disagree on purpose.
      - name: Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: schrodump/schrodump:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy (fail on critical)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: schrodump/schrodump:scan
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  secrets:
    name: committed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Gitleaks scans history, not just the working tree — a secret removed in a later commit
          # is still published.
          fetch-depth: 0

      # $GITHUB_WORKSPACE rather than the ${{ }} expression: workflow expressions are interpolated
      # into the shell before it runs, so keeping them out of `run:` is the habit that prevents
      # injection the day one of these values stops being trustworthy.
      - name: Gitleaks
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" \
            zricethezav/gitleaks:v8.30.1 detect \
            --source=/repo --redact --verbose --exit-code=1

  spdx:
    name: SPDX headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The licence is the project's only leverage over how the code is redistributed, and a file
      # without the header is a file whose licence is arguable.
      - name: Every source file carries the SPDX header
        run: |
          missing=0
          for file in $(git ls-files '*.ts' '*.tsx' '*.mjs' '*.js' 'docker/Dockerfile' \
                        'docker/executors/*.Dockerfile' '.github/workflows/*.yml'); do
            # Regenerated by `next build` on every run; Next owns its contents, not us.
            [ "$file" = "apps/web/next-env.d.ts" ] && continue
            if ! head -5 "$file" | grep -q 'SPDX-License-Identifier: AGPL-3.0-or-later'; then
              echo "missing SPDX header: $file"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "all source files carry the header"
